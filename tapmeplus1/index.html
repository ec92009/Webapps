<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TapMePlus1</title>
  <style>
    :root {
      --bg1: #0f1220;
      --bg2: #1d2540;
      --card: rgba(255,255,255,.1);
      --line: rgba(255,255,255,.14);
      --text: #f5f7ff;
      --muted: #b8c0e0;
      --accent: #7cf29a;
      --accent2: #7cc8ff;
      --shadow: 0 24px 60px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,200,255,.28), transparent 26%),
        radial-gradient(circle at bottom right, rgba(124,242,154,.18), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    .wrap {
      width: min(760px, 100%);
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: .95;
    }
    p { margin: 0; color: var(--muted); }
    .hero {
      display: grid;
      gap: 18px;
      text-align: center;
      justify-items: center;
    }
    .version {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(124,200,255,.16);
      color: #dff2ff;
      font-weight: 800;
      font-size: .84rem;
    }
    .score {
      font-size: clamp(3.6rem, 14vw, 7rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.04em;
    }
    .tap-btn {
      border: none;
      border-radius: 999px;
      min-width: min(360px, 85vw);
      min-height: min(360px, 85vw);
      width: min(360px, 85vw);
      height: min(360px, 85vw);
      background: linear-gradient(180deg, #92d8ff, #79f1a7);
      color: #102134;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 22px 44px rgba(0,0,0,.28), inset 0 6px 16px rgba(255,255,255,.35);
      transition: transform .08s ease, box-shadow .12s ease;
    }
    .tap-btn:active {
      transform: scale(.97);
      box-shadow: 0 12px 24px rgba(0,0,0,.24), inset 0 4px 10px rgba(255,255,255,.3);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
    }
    .stat {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
    }
    .stat strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .small-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .milestone {
      text-align: center;
      font-weight: 700;
      color: #fef3ba;
      min-height: 1.4em;
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .card { padding: 18px; border-radius: 22px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <span class="version">TapMePlus1 · v47.0</span>
      <h1>TapMePlus1</h1>
      <p>Absurdly simple. Weirdly satisfying. Every tap gives you exactly +1.</p>
      <div class="score" id="score">0</div>
      <button class="tap-btn" id="tapBtn" type="button">+1</button>
      <div class="milestone" id="milestone">First to 10 wins absolutely nothing.</div>
    </section>

    <section class="card">
      <div class="stats">
        <div class="stat"><strong id="best">0</strong><span>Best score</span></div>
        <div class="stat"><strong id="taps">0</strong><span>Total taps</span></div>
        <div class="stat"><strong id="rate">0.0/s</strong><span>Tap rate</span></div>
      </div>
      <div class="row" style="margin-top:16px;">
        <button class="small-btn" id="resetBtn" type="button">Reset score</button>
        <button class="small-btn" id="zeroAllBtn" type="button">Reset everything</button>
      </div>
    </section>
  </main>

  <script>
    const els = {
      score: document.getElementById('score'),
      best: document.getElementById('best'),
      taps: document.getElementById('taps'),
      rate: document.getElementById('rate'),
      milestone: document.getElementById('milestone'),
      tapBtn: document.getElementById('tapBtn'),
      resetBtn: document.getElementById('resetBtn'),
      zeroAllBtn: document.getElementById('zeroAllBtn'),
    };

    const KEY = 'tapmeplus1-state';
    const milestones = {
      10: '10 taps. Elite athlete behavior.',
      25: '25. Still just +1 each time. Respect.',
      50: '50. This is now a lifestyle.',
      100: '100. Tap legend status unlocked.',
      250: '250. Finger endurance looks strong.',
      500: '500. Genuinely unnecessary. I admire it.',
      1000: '1000. You have fully understood the game.'
    };

    let state = load();
    let sessionStart = performance.now();
    let sessionTaps = 0;

    function load() {
      try {
        return JSON.parse(localStorage.getItem(KEY)) || { score: 0, best: 0, taps: 0 };
      } catch {
        return { score: 0, best: 0, taps: 0 };
      }
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function render() {
      els.score.textContent = state.score;
      els.best.textContent = state.best;
      els.taps.textContent = state.taps;
      const seconds = Math.max((performance.now() - sessionStart) / 1000, 0.001);
      els.rate.textContent = `${(sessionTaps / seconds).toFixed(1)}/s`;
      const milestone = milestones[state.score] || (state.score === 0 ? 'First to 10 wins absolutely nothing.' : 'Keep tapping. The number appreciates your effort.');
      els.milestone.textContent = milestone;
    }

    function tap() {
      state.score += 1;
      state.taps += 1;
      state.best = Math.max(state.best, state.score);
      sessionTaps += 1;
      save();
      render();
    }

    els.tapBtn.addEventListener('click', tap);
    els.resetBtn.addEventListener('click', () => {
      state.score = 0;
      save();
      sessionStart = performance.now();
      sessionTaps = 0;
      render();
    });
    els.zeroAllBtn.addEventListener('click', () => {
      state = { score: 0, best: 0, taps: 0 };
      save();
      sessionStart = performance.now();
      sessionTaps = 0;
      render();
    });

    render();
  </script>
</body>
</html>
