name: Deploy Webapps Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'index.html'
      - 'assets/**'
      - 'byElie/**'
      - 'conway/**'
      - 'oleamediaco/**'
      - 'oleataxco/**'
      - 'oleataxco-v25/**'
      - 'reversi/**'
      - 'sortingalgos/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'archive/' \
            --exclude 'docs/' \
            --exclude 'scripts/' \
            --exclude 'AGENTS.md' \
            --exclude 'README.md' \
            --exclude '.gitignore' \
            ./ _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
