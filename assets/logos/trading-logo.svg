<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Trading logo</title>
  <desc id="desc">Cute sticker-style trading dashboard with smiling chart elements and a rising arrow.</desc>
  <defs>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf7ff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#ddeaff"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#97efb5"/>
      <stop offset="100%" stop-color="#4ccc86"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb0b7"/>
      <stop offset="100%" stop-color="#ff7f93"/>
    </linearGradient>
    <linearGradient id="coinFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8bd7ff"/>
      <stop offset="100%" stop-color="#61b8ff"/>
    </linearGradient>
    <linearGradient id="arrowFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd09a"/>
      <stop offset="100%" stop-color="#ffb76d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#221424" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#fff2d9" flood-opacity="0.8"/>
    </filter>
    <style>
      .outline { stroke: #68475f; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #68475f; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .grid { stroke: #c8d7f0; stroke-width: 5; }
      .face { fill: #68475f; }
      .blush { fill: #ffbdc6; opacity: 0.85; }
    </style>
  </defs>

  <g filter="url(#glow)">
    <g filter="url(#shadow)">
      <rect x="176" y="208" width="664" height="600" rx="86" fill="url(#cardFill)" class="outline"/>
      <rect x="236" y="268" width="544" height="432" rx="54" fill="url(#panelFill)" class="thin"/>

      <g class="grid">
        <line x1="302" y1="328" x2="302" y2="652"/>
        <line x1="388" y1="328" x2="388" y2="652"/>
        <line x1="474" y1="328" x2="474" y2="652"/>
        <line x1="560" y1="328" x2="560" y2="652"/>
        <line x1="646" y1="328" x2="646" y2="652"/>
        <line x1="732" y1="328" x2="732" y2="652"/>
        <line x1="282" y1="356" x2="736" y2="356"/>
        <line x1="282" y1="428" x2="736" y2="428"/>
        <line x1="282" y1="500" x2="736" y2="500"/>
        <line x1="282" y1="572" x2="736" y2="572"/>
        <line x1="282" y1="644" x2="736" y2="644"/>
      </g>

      <line x1="340" y1="370" x2="340" y2="592" class="outline"/>
      <rect x="311" y="462" width="58" height="130" rx="18" fill="url(#greenBar)" class="thin"/>

      <line x1="430" y1="336" x2="430" y2="588" class="outline"/>
      <rect x="401" y="388" width="58" height="156" rx="18" fill="url(#redBar)" class="thin"/>

      <line x1="520" y1="402" x2="520" y2="620" class="outline"/>
      <rect x="491" y="492" width="58" height="110" rx="18" fill="url(#greenBar)" class="thin"/>

      <line x1="610" y1="300" x2="610" y2="588" class="outline"/>
      <rect x="581" y="342" width="58" height="176" rx="18" fill="url(#greenBar)" class="thin"/>

      <line x1="700" y1="272" x2="700" y2="556" class="outline"/>
      <rect x="671" y="314" width="58" height="148" rx="18" fill="url(#greenBar)" class="thin"/>

      <circle cx="336" cy="744" r="92" fill="url(#coinFill)" class="outline"/>
      <path d="M288 722c18-26 76-36 108 6" fill="none" stroke="#eef9ff" stroke-width="14" stroke-linecap="round"/>
      <circle cx="304" cy="736" r="11" class="face"/>
      <circle cx="368" cy="736" r="11" class="face"/>
      <ellipse cx="286" cy="770" rx="18" ry="11" class="blush"/>
      <ellipse cx="386" cy="770" rx="18" ry="11" class="blush"/>
      <path d="M319 776c13 18 45 18 58 0" fill="none" class="thin"/>

      <path d="M690 256h120v-54l128 116-128 116v-54H690z" fill="url(#arrowFill)" class="outline"/>
      <circle cx="772" cy="310" r="10" class="face"/>
      <circle cx="814" cy="310" r="10" class="face"/>
      <ellipse cx="756" cy="338" rx="16" ry="10" class="blush"/>
      <ellipse cx="830" cy="338" rx="16" ry="10" class="blush"/>
      <path d="M775 344c11 13 27 13 38 0" fill="none" class="thin"/>
      <line x1="784" y1="372" x2="784" y2="422" class="thin"/>
      <line x1="814" y1="372" x2="814" y2="422" class="thin"/>
      <line x1="784" y1="384" x2="746" y2="364" class="thin"/>
      <line x1="814" y1="384" x2="848" y2="360" class="thin"/>
    </g>
  </g>
</svg>
