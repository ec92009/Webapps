<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Deliveries logo</title>
  <desc id="desc">Cute sticker-style delivery box riding on a smiling van with package tracking accents.</desc>
  <defs>
    <linearGradient id="vanBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fd7ff"/>
      <stop offset="100%" stop-color="#67b5ff"/>
    </linearGradient>
    <linearGradient id="vanCab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4f2ff"/>
      <stop offset="100%" stop-color="#93dfff"/>
    </linearGradient>
    <linearGradient id="boxFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd59f"/>
      <stop offset="100%" stop-color="#ffba6f"/>
    </linearGradient>
    <linearGradient id="tagFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8f2a3"/>
      <stop offset="100%" stop-color="#72d28a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#24152b" flood-opacity="0.26"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#fff2df" flood-opacity="0.82"/>
    </filter>
    <style>
      .outline { stroke: #694b62; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #694b62; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .face { fill: #694b62; }
      .blush { fill: #ffbdc5; opacity: 0.88; }
      .wheel { fill: #4e5874; stroke: #694b62; stroke-width: 12; }
      .hub { fill: #eef7ff; }
    </style>
  </defs>

  <g filter="url(#glow)">
    <g filter="url(#shadow)">
      <rect x="208" y="466" width="470" height="198" rx="58" fill="url(#vanBody)" class="outline"/>
      <path d="M678 516h82c36 0 59 12 82 44l48 67v37H678z" fill="url(#vanCab)" class="outline"/>
      <rect x="266" y="508" width="164" height="78" rx="26" fill="#eff8ff" class="thin"/>
      <rect x="454" y="508" width="124" height="78" rx="22" fill="#eff8ff" class="thin"/>
      <path d="M746 546h65c21 0 32 5 46 22l32 44h-143z" fill="#eff8ff" class="thin"/>
      <line x1="208" y1="664" x2="890" y2="664" class="thin"/>

      <circle cx="334" cy="704" r="66" class="wheel"/>
      <circle cx="334" cy="704" r="28" class="hub"/>
      <circle cx="744" cy="704" r="66" class="wheel"/>
      <circle cx="744" cy="704" r="28" class="hub"/>

      <rect x="344" y="250" width="318" height="250" rx="44" fill="url(#boxFill)" class="outline"/>
      <path d="M344 332l158-86 160 86" fill="#ffddb4" class="outline"/>
      <line x1="502" y1="246" x2="502" y2="500" class="thin"/>
      <line x1="410" y1="378" x2="594" y2="378" class="thin"/>

      <circle cx="504" cy="406" r="14" class="face"/>
      <circle cx="564" cy="406" r="14" class="face"/>
      <ellipse cx="478" cy="446" rx="20" ry="12" class="blush"/>
      <ellipse cx="590" cy="446" rx="20" ry="12" class="blush"/>
      <path d="M510 452c14 18 34 18 48 0" fill="none" class="thin"/>

      <path d="M250 370c46-54 102-82 170-88" fill="none" stroke="#97d9a7" stroke-width="18" stroke-linecap="round"/>
      <path d="M390 236l58 24-50 37" fill="none" stroke="#97d9a7" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="700" y="252" width="132" height="110" rx="34" fill="url(#tagFill)" class="outline"/>
      <circle cx="742" cy="306" r="10" class="face"/>
      <circle cx="788" cy="306" r="10" class="face"/>
      <ellipse cx="724" cy="336" rx="14" ry="9" class="blush"/>
      <ellipse cx="806" cy="336" rx="14" ry="9" class="blush"/>
      <path d="M749 339c10 12 22 12 32 0" fill="none" class="thin"/>
      <path d="M828 298h34" fill="none" class="thin"/>
    </g>
  </g>
</svg>
