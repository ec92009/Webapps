<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorting Algorithms Visualizer</title>
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/logos/sorting-logo.png" />
  <style>
    .bg-brand{position:fixed;inset:0;pointer-events:none;z-index:0;background:url('../assets/logos/sorting-logo.png') center 18vh / min(58vmin,520px) no-repeat;opacity:.16;filter:drop-shadow(0 18px 40px rgba(0,0,0,.22));}
    body > *{position:relative;z-index:1;}

    :root{--bg:#0b0d12;--card:#151923;--line:#2a3140;--text:#eef3ff;--muted:#9aa6bf;--accent:#25c06d;}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:14px}
    .sticky-head{position:sticky;top:0;z-index:20;background:rgba(11,13,18,.92);backdrop-filter:blur(8px);padding:10px 0 8px;border-bottom:1px solid rgba(42,49,64,.8);margin-bottom:10px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .title-row{display:flex;align-items:center;gap:10px}
    .site-logo{width:42px;height:42px;border-radius:12px;border:1px solid #2a3140;object-fit:cover;background:#101521}
    h1{margin:0;font-size:1.25rem}
    .meta{color:var(--muted);font-size:.92rem}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 0}
    button{border:1px solid var(--line);background:#111622;color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700}
    button.primary{background:var(--accent);color:#04130b;border-color:#16985a}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .name{font-weight:800}
    .stat{font-size:.82rem;color:var(--muted)}
    canvas{width:100%;height:180px;background:#0e1320;border-radius:8px;border:1px solid #243047}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.sticky-head{top:0;padding-top:8px}}
  </style>
</head>
<body>
<div class="bg-brand" aria-hidden="true"></div>
<div class="wrap">
  <div class="sticky-head">
    <div class="top">
      <div class="title-row"><img class="site-logo" src="../assets/logos/sorting-logo.png" alt="Sorting logo" /><h1>Sorting Algorithms Visualizer</h1></div>
      <div class="meta">100 random integers · Bubble → Insertion → Selection → Merge → Quick · Version v23.0</div>
    </div>

    <div class="controls">
      <button id="newSet" class="primary">New Random Set</button>
      <button id="run">Run All</button>
      <button id="pause">Pause</button>
      <button id="step">Step</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const N=100;
const ALGO_NAMES=['Bubble Sort','Insertion Sort','Selection Sort','Merge Sort','Quick Sort'];
const speedMs=14;

const grid=document.getElementById('grid');
let base=[];
let sims=[];
let running=false;
let timer=null;

function randData(){ return Array.from({length:N},()=>Math.floor(Math.random()*400)+10); }

function makePanel(name){
  const box=document.createElement('div'); box.className='panel';
  box.innerHTML=`<div class="head"><div class="name">${name}</div><div class="stat">ops: <span>0</span></div></div><canvas width="520" height="180"></canvas>`;
  grid.appendChild(box);
  return {box, canvas:box.querySelector('canvas'), stat:box.querySelector('.stat span')};
}

function draw(sim){
  const c=sim.ui.canvas, ctx=c.getContext('2d');
  const w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#0e1320'; ctx.fillRect(0,0,w,h);
  const bw=w/sim.arr.length;
  let max=Math.max(...sim.arr,1);
  for(let i=0;i<sim.arr.length;i++){
    const v=sim.arr[i];
    const bh=(v/max)*(h-8);
    const x=i*bw;
    const y=h-bh;
    let col='#4aa3ff';
    if(i===sim.a||i===sim.b) col='#ffd166';
    if(sim.done) col='#25c06d';
    ctx.fillStyle=col;
    ctx.fillRect(x,y,Math.max(1,bw-1),bh);
  }
  sim.ui.stat.textContent=sim.ops;
}

function* bubble(arr){
  for(let i=0;i<arr.length-1;i++){
    for(let j=0;j<arr.length-1-i;j++){
      yield {a:j,b:j+1};
      if(arr[j]>arr[j+1]) [arr[j],arr[j+1]]=[arr[j+1],arr[j]];
    }
  }
}
function* insertion(arr){
  for(let i=1;i<arr.length;i++){
    let key=arr[i], j=i-1;
    while(j>=0&&arr[j]>key){ arr[j+1]=arr[j]; yield {a:j,b:j+1}; j--; }
    arr[j+1]=key; yield {a:j+1,b:i};
  }
}
function* selection(arr){
  for(let i=0;i<arr.length-1;i++){
    let m=i;
    for(let j=i+1;j<arr.length;j++){ yield {a:m,b:j}; if(arr[j]<arr[m]) m=j; }
    if(m!==i) [arr[i],arr[m]]=[arr[m],arr[i]];
    yield {a:i,b:m};
  }
}
function* mergeSortGen(arr){
  function* merge(lo,mid,hi){
    const L=arr.slice(lo,mid+1), R=arr.slice(mid+1,hi+1);
    let i=0,j=0,k=lo;
    while(i<L.length && j<R.length){ arr[k++]=L[i]<=R[j]?L[i++]:R[j++]; yield {a:k-1,b:k-1}; }
    while(i<L.length){ arr[k++]=L[i++]; yield {a:k-1,b:k-1}; }
    while(j<R.length){ arr[k++]=R[j++]; yield {a:k-1,b:k-1}; }
  }
  function* sort(lo,hi){
    if(lo>=hi) return;
    const mid=(lo+hi)>>1;
    yield* sort(lo,mid); yield* sort(mid+1,hi); yield* merge(lo,mid,hi);
  }
  yield* sort(0,arr.length-1);
}
function* quickSortGen(arr){
  function* sort(lo,hi){
    if(lo>=hi) return;
    let p=arr[hi], i=lo;
    for(let j=lo;j<hi;j++){
      yield {a:j,b:hi};
      if(arr[j]<p){ [arr[i],arr[j]]=[arr[j],arr[i]]; i++; yield {a:i-1,b:j}; }
    }
    [arr[i],arr[hi]]=[arr[hi],arr[i]]; yield {a:i,b:hi};
    yield* sort(lo,i-1); yield* sort(i+1,hi);
  }
  yield* sort(0,arr.length-1);
}

function build(){
  grid.innerHTML='';
  const gens=[bubble,insertion,selection,mergeSortGen,quickSortGen];
  sims=[];
  for(let i=0;i<ALGO_NAMES.length;i++){
    const ui=makePanel(ALGO_NAMES[i]);
    const arr=base.slice();
    sims.push({arr, ui, it:gens[i](arr), done:false, ops:0, a:-1, b:-1});
  }
  sims.forEach(draw);
}

function stepOnce(){
  let active=0;
  for(const s of sims){
    if(s.done) continue;
    const n=s.it.next();
    if(n.done){ s.done=true; s.a=s.b=-1; draw(s); continue; }
    s.ops++; s.a=n.value?.a??-1; s.b=n.value?.b??-1; draw(s); active++;
  }
  if(!active){ running=false; clearInterval(timer); timer=null; setPauseLabel(); }
}

const pauseBtn=document.getElementById('pause');

function setPauseLabel(){
  pauseBtn.textContent = running ? 'Pause' : 'Resume';
}

function run(){
  if(running) return;
  running=true;
  timer=setInterval(stepOnce,speedMs);
  setPauseLabel();
}

function pause(){
  running=false;
  clearInterval(timer);
  timer=null;
  setPauseLabel();
}

function togglePauseResume(){
  if(running) pause();
  else run();
}

document.getElementById('newSet').onclick=()=>{ pause(); base=randData(); build(); };
document.getElementById('run').onclick=run;
pauseBtn.onclick=togglePauseResume;
document.getElementById('step').onclick=()=>{ pause(); stepOnce(); };

base=randData(); build(); setPauseLabel();
</script>
</body>
</html>
