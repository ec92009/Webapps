<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Photos By Elie | Photo Detail</title>
  <meta name="description" content="Mock photo detail and resolution purchase options for Photos By Elie."/>
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/byelie-logo.png"/>
  <script>(()=>{try{const saved=localStorage.getItem('byelie-theme');if(saved==='light'||saved==='dark')document.documentElement.dataset.theme=saved}catch{}})();</script>
  <link rel="stylesheet" href="./shared.css?v=63.10"/>
  <link rel="stylesheet" href="./styles.css?v=63.10"/>
  <link rel="stylesheet" href="./photos.css?v=63.10"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="topbar shell">
    <nav class="version-switch" aria-label="Site navigation">
      <a href="https://ec92009.github.io/byElie/">By Elie</a> <span>|</span>
      <a href="./">Photos</a> <span>|</span>
      <a data-nav-current href="./france.html">Gallery</a>
    </nav>
    <div class="brand"><img class="site-logo" src="./assets/byelie-logo.png" alt="By Elie logo"/>PHOTOS BY ELIE - v63.10</div>
    <button class="theme-toggle" type="button" data-theme-toggle><span class="mode-light">Night</span><span class="mode-dark">Day</span></button>
  </header>
  <main id="main-content" class="shell">
    <section class="panel detail-layout">
      <div class="detail-preview mock-photo" data-photo-preview><span>Photo</span></div>
      <div class="detail-panel">
        <p class="eyebrow" data-photo-meta>Photo detail</p>
        <h1 data-photo-title>Photo</h1>
        <p class="lead" data-photo-caption></p>
        <div class="detail-actions">
          <a class="btn secondary" data-back-link href="./france.html">Back to gallery</a>
          <a class="basket-pill" href="./basket.html">Basket <strong data-basket-count>0</strong></a>
        </div>
      </div>
    </section>
    <section class="panel purchase-panel">
      <div>
        <p class="eyebrow">Resolution licenses</p>
        <h2>Choose files</h2>
      </div>
      <div class="resolution-list" data-resolution-list></div>
      <div class="basket-bar">
        <strong>Total selected: <span data-selection-total>$0</span></strong>
        <a class="btn primary" href="./basket.html">Basket</a>
      </div>
      <p class="basket-status" data-basket-status aria-live="polite"></p>
    </section>
  </main>
  <script src="./photos.js?v=63.10"></script>
  <script src="./photos-data.js?v=63.10"></script>
  <script src="./basket-store.js?v=63.10"></script>
  <script src="./photo-detail.js?v=63.10"></script>
</body>
</html>
